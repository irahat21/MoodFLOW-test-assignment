# Builds and deploys the MoodFLOW application (backend + frontend).
#
# Required GitHub Secrets:
#   RENDER_DEPLOY_HOOK        — Backend deploy hook URL (Render)
#   RENDER_FRONTEND_HOOK      — Frontend deploy hook URL (Render)
#

name: Deploy MoodFLOW

on:
  push:
    branches: [public-cloud]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Backend Deploy
        if: github.event_name == 'push'
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Trigger Frontend Deploy
        if: github.event_name == 'push'
        run: curl -X POST ${{ secrets.RENDER_FRONTEND_HOOK }}